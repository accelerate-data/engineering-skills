# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Creating-linear-issue skill — clarification and planning before issue creation"

prompts:
  - id: creating-linear-issue
    label: creating-linear-issue
    raw: file://../../prompts/skill-creating-linear-issue.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-haiku-4-5-20251001
      working_dir: ../..
      max_turns: 20
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Bash
        - Glob
        - Grep

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-linear-skill-contract.js

tests:
  - description: "create-issue — resolves project defaults, confirms critical fields, and keeps planning gate"
    vars:
      expect_searches_codebase_first: "true"
      expect_enters_plan_mode: "true"
      expected_issue_kind: "feature"
      expect_has_distinct_paths: "true"
      expect_resolves_project_before_asking: "true"
      expect_confirms_critical_fields_with_user: "true"
      expected_assignee_default: "creator"
      expected_cycle_default: "current"
      expected_milestone_strategy: "future-only"
      expect_asks_to_record_project_in_agents_md_only_after_user_supplies_it: "false"
      required_terms: "feature,milestone,project,current,creator,agents.md,assignee,cycle"
      forbidden_terms: "creates_issue_before_plan_approval\":true"
