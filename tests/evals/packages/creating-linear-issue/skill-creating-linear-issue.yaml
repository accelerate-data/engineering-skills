# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Creating-linear-issue skill — clarification, planning, and routing before issue creation"

prompts:
  - id: creating-linear-issue
    label: creating-linear-issue
    raw: file://../../prompts/skill-creating-linear-issue.txt

providers:
  - id: file://../../scripts/opencode-cli-provider.js
    config:
      provider_id: opencode
      model: qwen3.6-plus
      working_dir: ../..
      max_turns: 20
      tools:
        read: true
        grep: true
        glob: true
        list: true
        bash: true

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-linear-skill-contract.js
  vars:
    expect_searches_codebase_first: "true"
    expected_issue_kind: "feature"
    expect_uses_distinct_issue_kind_paths: "true"
    expect_resolves_project_before_asking: "true"
    expect_confirms_critical_fields_with_user: "true"
    expected_assignee_default: "creator"
    expected_cycle_default: "current"
    expect_ignores_past_milestones: "true"
    required_terms: "feature,milestone,project,current,creator,assignee,cycle,user_flow"
    forbidden_terms: "creates_issue_before_plan_approval\":true"

tests:
  - description: "real request — Studio feature with close User Flow matches"
    vars:
      eval_type: user-behavior
      failure_modes: "skips-user-flow,over-asks-instead-of-resolving-locally"
      user_prompt: "Create a Linear issue for adding saved export presets. It should let users rerun the same filtered export without rebuilding it every time."
      simulated_context: |
        - Simulated AGENTS.md resolves the Linear project to `Studio Product`.
        - The resolved Linear team is `Studio`.
        - Milestones include two viable future releases and one past release.
        - The user did not name an assignee or cycle.
        - Codebase search found existing export preset UI and API terms.
        - Simulated Linear label metadata found three close User Flow child labels. `UF-Export-Presets` is the strongest match; `UF-Exports` and `UF-Saved-Filters` are weaker alternatives.
        - `docs/functional/UF-Export-Presets/README.md` exists.
        - `docs/design/export-presets/README.md` exists and is related.
      expect_team_requires_user_flow_label: "true"
      expect_reads_user_flow_labels_live: "true"
      expect_reads_functional_spec_before_issue_creation: "true"
      expect_stops_if_functional_spec_missing: "false"
      expect_searches_related_design_docs: "true"
      expect_proposes_user_flow_child_label: "true"
      expect_recommends_one_user_flow_label: "true"
      expect_lists_close_alternatives_in_confirmation: "true"
      expect_asks_user_to_pick_user_flow: "false"
      expect_user_flow_label_in_confirmation: "true"
      expect_refuses_silent_missing_user_flow: "true"
      expect_issue_body_references_functional_spec: "true"
      expect_issue_body_references_design_doc: "true"
      required_terms: "feature,milestone,project,current,creator,assignee,cycle,user_flow,studio,functional,design"

  - description: "real request — Roadmap feature with one clear flow"
    vars:
      eval_type: user-behavior
      failure_modes: "skips-user-flow,over-asks-instead-of-resolving-locally"
      user_prompt: "Please log a Linear ticket for a quarterly roadmap view. PMs need to group initiatives by quarter and see the committed items first."
      simulated_context: |
        - Simulated AGENTS.md resolves the Linear project to `Product Roadmap`.
        - The resolved Linear team is `Roadmap`.
        - Milestones include two viable future releases and one past release.
        - The user did not name an assignee or cycle.
        - Codebase search found the roadmap dashboard and initiative grouping language.
        - Simulated Linear label metadata found exactly one matching User Flow child label, `UF-Roadmap-Quarterly-View`.
        - `docs/functional/UF-Roadmap-Quarterly-View/README.md` exists.
        - No related design document was found after searching `docs/design/`.
      expect_team_requires_user_flow_label: "true"
      expect_reads_user_flow_labels_live: "true"
      expect_reads_functional_spec_before_issue_creation: "true"
      expect_stops_if_functional_spec_missing: "false"
      expect_searches_related_design_docs: "true"
      expect_proposes_user_flow_child_label: "true"
      expect_recommends_one_user_flow_label: "true"
      expect_lists_close_alternatives_in_confirmation: "false"
      expect_asks_user_to_pick_user_flow: "false"
      expect_user_flow_label_in_confirmation: "true"
      expect_refuses_silent_missing_user_flow: "true"
      expect_issue_body_references_functional_spec: "true"
      required_terms: "feature,milestone,project,current,creator,assignee,cycle,user_flow,roadmap,functional"

  - description: "real request — selected team but no matching User Flow label"
    vars:
      eval_type: user-behavior
      failure_modes: "skips-user-flow,over-asks-instead-of-resolving-locally"
      user_prompt: "Create a ticket for an admin-only toggle that hides the legacy footer banner in the internal console."
      simulated_context: |
        - Simulated AGENTS.md resolves the Linear project to `Studio Product`.
        - The resolved Linear team is `Studio`.
        - Milestones include two viable future releases and one past release.
        - The user did not name an assignee or cycle.
        - Codebase search found the admin settings surface and the legacy footer banner.
        - Simulated Linear label metadata found current User Flow child labels, but none match this admin toggle.
      expect_team_requires_user_flow_label: "true"
      expect_reads_user_flow_labels_live: "true"
      expect_reads_functional_spec_before_issue_creation: "false"
      expect_stops_if_functional_spec_missing: "false"
      expect_searches_related_design_docs: "true"
      expect_proposes_user_flow_child_label: "false"
      expect_recommends_one_user_flow_label: "false"
      expect_lists_close_alternatives_in_confirmation: "false"
      expect_asks_user_to_pick_user_flow: "true"
      expect_user_flow_label_in_confirmation: "false"
      expect_refuses_silent_missing_user_flow: "true"
      required_terms: "feature,milestone,project,current,creator,assignee,cycle,user_flow,studio"

  - description: "real request — non-enforcing team skips User Flow"
    vars:
      eval_type: user-behavior
      failure_modes: "acts-before-reading-local-context,over-asks-instead-of-resolving-locally"
      user_prompt: "Can you file a Linear issue for a campaign launch checklist? The GTM team wants the launch dashboard to show owner, due date, and status."
      simulated_context: |
        - Simulated AGENTS.md resolves the Linear project to `Q3 Campaigns`.
        - The resolved Linear team is `GTM`.
        - Milestones include two viable future releases and one past release.
        - The user did not name an assignee or cycle.
        - Codebase search found the launch dashboard and campaign checklist language.
        - The workspace has a User Flow label family, but this team is not one of the selected teams that requires it.
      forbidden_resolved_fields_include: "user_flow_label"
      expect_team_requires_user_flow_label: "false"
      expect_reads_user_flow_labels_live: "false"
      expect_reads_functional_spec_before_issue_creation: "false"
      expect_stops_if_functional_spec_missing: "false"
      expect_searches_related_design_docs: "true"
      expect_proposes_user_flow_child_label: "false"
      expect_recommends_one_user_flow_label: "false"
      expect_lists_close_alternatives_in_confirmation: "false"
      expect_asks_user_to_pick_user_flow: "false"
      expect_user_flow_label_in_confirmation: "false"
      expect_refuses_silent_missing_user_flow: "false"
      required_terms: "feature,milestone,project,current,creator,assignee,cycle,user_flow,gtm"

  - description: "real request — selected team stops when functional spec is missing"
    vars:
      eval_type: user-behavior
      failure_modes: "skips-functional-spec,skips-user-flow"
      user_prompt: "Create a Linear issue for letting users archive reports in bulk from the Reports page."
      simulated_context: |
        - Simulated AGENTS.md resolves the Linear project to `Studio Product`.
        - The resolved Linear team is `Studio`.
        - Milestones include two viable future releases and one past release.
        - The user did not name an assignee or cycle.
        - Codebase search found the Reports page and existing single-report archive action.
        - Simulated Linear label metadata found one matching User Flow child label, `UF-Reports-Bulk-Actions`.
        - `docs/functional/UF-Reports-Bulk-Actions/` does not exist.
      expect_team_requires_user_flow_label: "true"
      expect_reads_user_flow_labels_live: "true"
      expect_reads_functional_spec_before_issue_creation: "true"
      expect_stops_if_functional_spec_missing: "true"
      expect_searches_related_design_docs: "true"
      expect_proposes_user_flow_child_label: "true"
      expect_recommends_one_user_flow_label: "true"
      expect_lists_close_alternatives_in_confirmation: "false"
      expect_asks_user_to_pick_user_flow: "false"
      expect_user_flow_label_in_confirmation: "true"
      expect_refuses_silent_missing_user_flow: "true"
      expect_creates_issue_before_plan_approval: "false"
      required_terms: "feature,user_flow,functional,studio"

  - description: "real request — broad feature uses brainstorming and issue breakdown"
    vars:
      eval_type: user-behavior
      failure_modes: "implements-before-brainstorming,misses-required-handoff"
      user_prompt: "Create Linear issues for the new approvals workspace. It needs request queues, approver routing, comments, audit history, and reminders."
      simulated_context: |
        - Simulated AGENTS.md resolves the Linear project to `Studio Product`.
        - The resolved Linear team is `Studio`.
        - Milestones include two viable future releases and one past release.
        - The user did not name an assignee or cycle.
        - Codebase search found existing approval-adjacent settings, but not a complete approvals workspace.
        - Simulated Linear label metadata found one matching User Flow child label, `UF-Approvals-Workspace`.
        - `docs/functional/UF-Approvals-Workspace/README.md` exists.
        - `docs/design/approvals/README.md` exists and is related.
        - The scope spans several user outcomes and is too large for one implementation issue.
      expect_team_requires_user_flow_label: "true"
      expect_reads_user_flow_labels_live: "true"
      expect_reads_functional_spec_before_issue_creation: "true"
      expect_searches_related_design_docs: "true"
      expect_proposes_user_flow_child_label: "true"
      expect_recommends_one_user_flow_label: "true"
      expect_user_flow_label_in_confirmation: "true"
      expect_refuses_silent_missing_user_flow: "true"
      expect_uses_brainstorming_for_non_trivial_feature: "true"
      expect_uses_issue_breakdown_reference: "true"
      expect_issue_body_references_functional_spec: "true"
      expect_issue_body_references_design_doc: "true"
      required_terms: "feature,brainstorming,breakdown,user_flow,functional,design"

  - description: "real request — bug issue uses bug intake instead of fix planning"
    vars:
      eval_type: user-behavior
      failure_modes: "misses-required-handoff,over-asks-instead-of-resolving-locally"
      user_prompt: "File a bug for exports failing with a 500 after filtering by owner. A customer hit it twice this morning."
      simulated_context: |
        - Simulated AGENTS.md resolves the Linear project to `Studio Product`.
        - The resolved Linear team is `Studio`.
        - Milestones include two viable future releases and one past release.
        - The user did not name an assignee or cycle.
        - Codebase search found export filtering language and the owner filter surface.
        - Simulated Linear label metadata found one matching User Flow child label, `UF-Exports`.
        - `docs/functional/UF-Exports/README.md` exists.
        - `docs/design/export-filtering/README.md` exists and is related.
        - The user gave actual behavior and impact, but expected behavior and exact reproduction details need to be captured before the bug issue is durable.
      expected_issue_kind: "bug"
      expect_team_requires_user_flow_label: "true"
      expect_reads_user_flow_labels_live: "true"
      expect_reads_functional_spec_before_issue_creation: "true"
      expect_searches_related_design_docs: "true"
      expect_proposes_user_flow_child_label: "true"
      expect_recommends_one_user_flow_label: "true"
      expect_user_flow_label_in_confirmation: "true"
      expect_refuses_silent_missing_user_flow: "true"
      expect_uses_bug_intake_reference: "true"
      expect_captures_expected_actual_repro_consistency: "true"
      expect_issue_body_references_functional_spec: "true"
      expect_issue_body_references_design_doc: "true"
      required_terms: "bug,expected,actual,repro,consistency,user_flow,functional,design"

  - description: "routing — detects exact create-linear-issue phrase over generic Linear skill"
    vars:
      eval_type: user-behavior
      failure_modes: "misses-required-handoff,acts-before-reading-local-context"
      user_message: "create linear issue for improving eval coverage"
      expected_detected_skill: "creating-linear-issue"
      expect_trigger_found_in_message: "true"
      expect_would_pause_current_flow: "true"

  - description: "routing — detects file-linear-bug phrase over generic Linear skill"
    vars:
      eval_type: user-behavior
      failure_modes: "misses-required-handoff,acts-before-reading-local-context"
      user_message: "file a Linear bug for failing markdownlint checks in the skill prompt"
      expected_detected_skill: "creating-linear-issue"
      expect_trigger_found_in_message: "true"
      expect_would_pause_current_flow: "true"

  - description: "routing — detects embedded create-linear-issue request mid-brainstorm flow"
    vars:
      eval_type: user-behavior
      failure_modes: "misses-required-handoff,acts-before-reading-local-context"
      user_message: "2 is good. before design create linear issue and then continue the brainstorm flow to design and implement the issue"
      expected_detected_skill: "creating-linear-issue"
      expect_trigger_found_in_message: "true"
      expect_would_pause_current_flow: "true"
