# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Closing-linear-issue skill — merge, close, and cleanup after review"

prompts:
  - id: closing-linear-issue
    label: closing-linear-issue
    raw: file://../../prompts/skill-closing-linear-issue.txt

providers:
  - id: file://../../scripts/opencode-cli-provider.js
    config:
      provider_id: opencode
      model: qwen3.6-plus
      working_dir: ../..
      max_turns: 20
      tools:
        read: true
        grep: true
        glob: true
        list: true
        bash: true

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-linear-skill-contract.js

tests:
  - description: "close-issue — stops if PR is not merged yet"
    vars:
      pr_state_scenario: "A PR already exists and has passed review, but it is not merged yet."
      extra_scenario: ""
      notes_focus: "In `notes`, explicitly say this skill stops and hands off if the PR is not already merged."
      expect_enters_plan_mode: "false"
      expect_creates_pr: "false"
      expect_stops_if_pr_not_merged: "true"
      expect_merges_pr: "false"
      expect_would_close_issue_in_this_scenario: "false"
      expect_would_do_cleanup_in_this_scenario: "false"
      expect_checks_off_acceptance_criteria: "false"
      required_terms: "merged,stop,github"
  - description: "close-issue — post-merge cleanup refreshes local main conservatively"
    vars:
      pr_state_scenario: "A PR already exists, has passed review, and is already merged."
      extra_scenario: "In this successful post-merge cleanup path, there are no tracked file edits left in the disposable feature worktree, and the workflow reaches the final step of refreshing local `main` against `origin/main`."
      notes_focus: "In `notes`, explicitly describe that local `main` must match `origin/main` exactly only after verifying there are no local-only commits, and that the workflow stops and reports if local `main` has diverged."
      expect_enters_plan_mode: "false"
      expect_creates_pr: "false"
      expect_stops_if_pr_not_merged: "true"
      expect_merges_pr: "false"
      expect_would_close_issue_in_this_scenario: "true"
      expect_would_do_cleanup_in_this_scenario: "true"
      expect_auto_cleans_disposable_post_merge: "true"
      expect_stops_on_tracked_changes_during_cleanup: "true"
      expect_checks_off_acceptance_criteria: "false"
      required_terms: "main,origin/main,local-only commits,diverg"
