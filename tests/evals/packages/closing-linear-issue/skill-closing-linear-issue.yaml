# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Closing-linear-issue skill — merge, close, and cleanup after review"

prompts:
  - id: closing-linear-issue
    label: closing-linear-issue
    raw: file://../../prompts/skill-closing-linear-issue.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-haiku-4-5-20251001
      working_dir: ../..
      max_turns: 20
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Bash
        - Glob
        - Grep

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-linear-skill-contract.js

tests:
  - description: "close-issue — merges PR, closes issue, no plan mode"
    vars:
      extra_scenario: ""
      notes_focus: ""
      expect_enters_plan_mode: "false"
      expect_creates_pr: "false"
      expect_merges_pr: "true"
      expect_closes_issue: "true"
      expect_does_cleanup: "true"
      expect_auto_cleans_disposable_post_merge: "true"
      expect_stops_on_tracked_changes_during_cleanup: "true"
      expect_checks_off_acceptance_criteria: "false"
      required_terms: "merge,tracked,ignored,untracked"
  - description: "close-issue — refreshes local main conservatively after cleanup"
    vars:
      extra_scenario: "In a separate successful cleanup path, there are no tracked file edits left in the disposable feature worktree, and the workflow reaches the final step of refreshing local `main` against `origin/main`."
      notes_focus: "In `notes`, explicitly describe that local `main` must match `origin/main` exactly only after verifying there are no local-only commits, and that the workflow stops and reports if local `main` has diverged."
      expect_enters_plan_mode: "false"
      expect_creates_pr: "false"
      expect_merges_pr: "true"
      expect_closes_issue: "true"
      expect_does_cleanup: "true"
      expect_auto_cleans_disposable_post_merge: "true"
      expect_checks_off_acceptance_criteria: "false"
      required_terms: "main,origin/main,local-only commits,diverged"
