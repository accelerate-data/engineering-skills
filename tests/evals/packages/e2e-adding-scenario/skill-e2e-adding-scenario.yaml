# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "e2e-adding-scenario skill — harness root resolution, append-not-replace, vocabulary enforcement, and handoff behavior"

prompts:
  - id: e2e-adding-scenario
    label: e2e-adding-scenario
    raw: file://../../prompts/skill-e2e-adding-scenario.txt

providers:
  - id: file://../../scripts/opencode-cli-provider.js
    config:
      provider_id: opencode
      model: qwen3.6-plus
      working_dir: ../..
      max_turns: 20
      tools:
        read: true
        grep: true
        glob: true
        list: true
        bash: true

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-e2e-bdd-skills-contract.js

tests:
  - description: "happy path — E2E_HARNESS_ROOT set, appends scenario without emitting Feature heading"
    vars:
      eval_type: user-behavior
      failure_modes: "wrong-harness-root,overwrites-feature,invents-steps,skips-vocabulary-check"
      scenario: |-
        - E2E_HARNESS_ROOT is set to /home/user/e2e-test-harness.
        - The harness .env contains: DATABASE_PATH=/home/user/app/data/db.sqlite
        - The target feature file features/domains/domain-crud.feature exists with 3 scenarios.
        - The user says: "Add a scenario that verifies the domain delete confirmation dialog appears before deletion."
        - steps/ui-actions.md contains a step pattern for "I click the button {label}".
        - steps/ui-assertions.md contains a step pattern for "I should see {text} on the page".
      expect_resolves_harness_root_from_env_var: "true"
      expect_appends_not_replaces: "true"
      expect_refuses_to_emit_feature_heading: "true"
      expect_uses_step_vocabulary_only: "true"
      expect_no_hardcoded_app_path: "true"
      expect_halts_on_missing_database_path: "false"

  - description: "halt — DATABASE_PATH missing from .env and E2E_APP_SRC not set"
    vars:
      eval_type: user-behavior
      failure_modes: "wrong-harness-root,overwrites-feature,invents-steps,skips-vocabulary-check"
      scenario: |-
        - E2E_HARNESS_ROOT is not set. CWD is /home/user/e2e-test-harness which contains features/ and steps/.
        - The harness .env exists but DATABASE_PATH is commented out: # DATABASE_PATH=
        - E2E_APP_SRC is not set.
        - App-root auto-discovery finds no readable sibling or parent app root.
        - The user says: "Add a scenario to features/domains/domain-crud.feature for the soft-delete flow."
      expect_halts_on_missing_database_path: "true"
      expect_falls_back_to_cwd_when_env_not_set: "true"
      expect_no_hardcoded_app_path: "true"

  - description: "handoff — target feature file does not exist, route to authoring skill"
    vars:
      eval_type: user-behavior
      failure_modes: "wrong-harness-root,overwrites-feature,invents-steps,skips-vocabulary-check"
      scenario: |-
        - E2E_HARNESS_ROOT is set to /home/user/e2e-test-harness.
        - The harness .env contains: DATABASE_PATH=/home/user/app/data/db.sqlite
        - The user says: "Add a scenario to features/billing/invoices.feature."
        - features/billing/invoices.feature does NOT exist in the harness.
      expect_handoffs_to_authoring_when_file_missing: "true"

  - description: "vocabulary gap — emits MISSING STEP comment instead of inventing a step"
    vars:
      eval_type: user-behavior
      failure_modes: "wrong-harness-root,overwrites-feature,invents-steps,skips-vocabulary-check"
      scenario: |-
        - E2E_HARNESS_ROOT is set to /home/user/e2e-test-harness.
        - The harness .env contains: DATABASE_PATH=/home/user/app/data/db.sqlite
        - The target feature file features/domains/domain-crud.feature exists.
        - The user says: "Add a scenario that checks the WebSocket notification appears after domain creation."
        - No step pattern for WebSocket notification exists in any steps/*.md file.
      expect_emits_missing_step_comment: "true"
      expect_uses_step_vocabulary_only: "true"
      expect_no_hardcoded_app_path: "true"
      expect_halts_on_missing_database_path: "false"

  - description: "E2E_APP_SRC set — skips DATABASE_PATH gate and proceeds to append"
    vars:
      eval_type: user-behavior
      failure_modes: "wrong-harness-root,overwrites-feature,invents-steps,skips-vocabulary-check"
      scenario: |-
        - E2E_HARNESS_ROOT is set to /home/user/e2e-test-harness.
        - E2E_APP_SRC is set to /home/user/app.
        - The harness .env exists but DATABASE_PATH is NOT set (commented out).
        - The target feature file features/domains/domain-crud.feature exists with 3 scenarios.
        - The user says: "Add a scenario that verifies the domain list shows newly created domains."
        - steps/ui-assertions.md contains a step pattern for listing domains.
      expect_uses_e2e_app_src_when_set: "true"
      expect_halts_on_missing_database_path: "false"
      expect_appends_not_replaces: "true"
      expect_no_hardcoded_app_path: "true"

  - description: "halt — E2E_APP_SRC set but unreadable"
    vars:
      eval_type: user-behavior
      failure_modes: "wrong-harness-root,overwrites-feature,invents-steps,skips-vocabulary-check"
      scenario: |-
        - E2E_HARNESS_ROOT is set to /home/user/e2e-test-harness.
        - E2E_APP_SRC is set to /home/user/missing-app, but that directory is not readable.
        - The harness .env contains no DATABASE_PATH.
        - The target feature file features/domains/domain-crud.feature exists.
        - The user says: "Add a scenario that verifies the domain list shows newly created domains."
      expect_uses_e2e_app_src_when_set: "true"
      expect_halts_on_unreadable_e2e_app_src: "true"
      expect_halts_on_missing_database_path: "false"
      expect_appends_not_replaces: "false"

  - description: "auto-discovery — DATABASE_PATH missing but one app root found without printing absolute path"
    vars:
      eval_type: user-behavior
      failure_modes: "wrong-harness-root,overwrites-feature,invents-steps,skips-vocabulary-check"
      scenario: |-
        - E2E_HARNESS_ROOT is set to /home/user/e2e-test-harness.
        - E2E_APP_SRC is not set.
        - The harness .env exists but DATABASE_PATH is commented out.
        - App-root auto-discovery finds exactly one readable sibling app root containing package.json and src/.
        - The target feature file features/domains/domain-crud.feature exists.
        - The user says: "Add a scenario that verifies the domain list shows newly created domains."
      expect_halts_on_missing_database_path: "false"
      expect_auto_discovery_avoids_expanded_app_path: "true"
      expect_no_hardcoded_app_path: "true"
      expect_appends_not_replaces: "true"

  - description: "skill-module awareness — checks skills/*.md before declaring a step missing"
    vars:
      eval_type: user-behavior
      failure_modes: "wrong-harness-root,overwrites-feature,invents-steps,skips-vocabulary-check"
      scenario: |-
        - E2E_HARNESS_ROOT is set to /home/user/e2e-test-harness.
        - The harness .env contains: DATABASE_PATH=/home/user/app/data/db.sqlite
        - The target feature file features/auth/login.feature exists.
        - The user says: "Add a scenario that logs in with TOTP two-factor authentication."
        - steps/skill-steps.md exists and references skills/totp-generation.md for TOTP code generation.
        - skills/totp-generation.md exists and describes a reusable TOTP step pattern.
        - No standalone TOTP step exists in any other steps/*.md file.
      expect_checks_skill_modules_before_missing_step: "true"
      expect_emits_missing_step_comment: "false"
      expect_no_hardcoded_app_path: "true"

  - description: "RUN_ID tagging — data literals carry {{RUN_ID}}, UI chrome does not"
    vars:
      eval_type: user-behavior
      failure_modes: "wrong-harness-root,overwrites-feature,invents-steps,skips-vocabulary-check"
      scenario: |-
        - E2E_HARNESS_ROOT is set to /home/user/e2e-test-harness.
        - The harness .env contains: DATABASE_PATH=/home/user/app/data/db.sqlite
        - The target feature file features/domains/domain-crud.feature exists.
        - The user says: "Add a scenario that creates a domain named 'Test Domain' and verifies it appears in the list."
        - steps/ui-actions.md has a "fill the {field} field with {value}" pattern.
        - steps/ui-assertions.md has an "I should see text {text}" pattern.
        - The "Add Data Domain" button already exists in the product; it is UI chrome, not test data.
      expect_emits_run_id_on_data_literals: "true"
      expect_no_hardcoded_app_path: "true"
      expect_appends_not_replaces: "true"
      expect_halts_on_missing_database_path: "false"

  - description: "guide-backed warning — MAPPINGS entry present, warns before appending"
    vars:
      eval_type: user-behavior
      failure_modes: "wrong-harness-root,overwrites-feature,invents-steps,skips-vocabulary-check"
      scenario: |-
        - E2E_HARNESS_ROOT is set to /home/user/e2e-test-harness.
        - The harness .env contains: DATABASE_PATH=/home/user/app/data/db.sqlite
        - The target feature file features/settings/domain-crud.feature exists.
        - generate-features.sh contains MAPPINGS entry: "settings/domains.md:settings/domain-crud.feature".
        - The user says: "Add a quick scenario for the domain archive flow to domain-crud.feature."
      expect_warns_guide_backed_before_appending: "true"
      expect_no_hardcoded_app_path: "true"
      expect_halts_on_missing_database_path: "false"
