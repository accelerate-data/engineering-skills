# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "write-tests skill — mode detection, Phase 0 discovery, framework-agnostic workflow"

prompts:
  - id: write-tests
    label: write-tests
    raw: file://../../prompts/skill-write-tests.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-haiku-4-5-20251001
      working_dir: ../..
      max_turns: 20
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Bash
        - Glob
        - Grep

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-write-tests-contract.js

tests:
  - description: "post-feature — Phase 0 discovery, no runner assumption, step 2 audit required, config file skipped"
    vars:
      expect_mode_detected: "post-feature"
      expect_checks_session_separation_before_mode_detection: "true"
      expect_runs_phase_0_discovery: "true"
      expect_presents_file_list_before_step_1: "true"
      expect_skips_trivial_config: "true"
      expect_posts_todo_checklist: "true"
      expect_assumes_test_runner: "false"
      expect_discovers_test_runner_from_project_files: "true"
      expect_skips_step_2_audit: "false"
      expect_step_2_check_required: "true"
      expect_leads_with_recommendation: "true"
      expect_would_write_tests_in_same_implementation_session: "false"
      required_terms: "phase,discover,checklist,recommend"
      forbidden_terms: "vitest\":true,assumes_test_runner\":true,skips_step_2_audit\":true"
