# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Create-feature-request skill — context loading, preview gate, and RO Linear creation contract"

prompts:
  - id: create-feature-request
    label: create-feature-request
    raw: file://../../prompts/skill-create-feature-request.txt

providers:
  - id: file://../../scripts/opencode-cli-provider.js
    config:
      provider_id: opencode
      model: qwen3.6-plus
      working_dir: ../..
      max_turns: 8
      tools:
        read: true
        grep: true
        glob: true
        list: true
        bash: true

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-create-feature-request-contract.js

tests:
  - description: "create-feature-request — loads context and metadata, previews first, and waits for confirmation before creating"
    vars:
      expect_loads_vibedata_strategy: "true"
      expect_loads_vibedata_architecture: "true"
      expect_queries_linear_labels: "true"
      expect_queries_linear_projects: "true"
      expect_queries_ro_statuses: "true"
      expect_uses_live_metadata_before_defaults: "true"
      expect_shows_preview_before_confirmation: "true"
      expect_requires_user_confirmation_before_create: "true"
      expect_creates_issue_before_confirmation: "false"
      expected_team: "RO"
      expected_default_priority: "Normal"
      expected_default_estimate: "S"
      required_description_sections: "Description,Strategic Alignment,Architecture Impact,Business Justification"
      expect_handles_context_load_failure_by_warning_and_continue: "true"
      expect_handles_linear_metadata_failure_by_defaults: "true"
      context_load_state: "available"

  - description: "create-feature-request — warns and continues without enrichment when GitHub context loading fails"
    vars:
      expect_loads_vibedata_strategy: "true"
      expect_loads_vibedata_architecture: "true"
      expect_queries_linear_labels: "true"
      expect_queries_linear_projects: "true"
      expect_queries_ro_statuses: "true"
      expect_uses_live_metadata_before_defaults: "true"
      expect_shows_preview_before_confirmation: "true"
      expect_requires_user_confirmation_before_create: "true"
      expect_creates_issue_before_confirmation: "false"
      expected_team: "RO"
      expected_default_priority: "Normal"
      expected_default_estimate: "S"
      required_description_sections: "Description"
      expect_handles_context_load_failure_by_warning_and_continue: "true"
      expect_handles_linear_metadata_failure_by_defaults: "true"
      expect_emits_context_load_warning: "true"
      expect_continues_without_context_enrichment: "true"
      expect_omits_context_enrichment_fields: "true"
      context_load_state: "failed"
