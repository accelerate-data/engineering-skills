# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Implementing-linear-issue skill — natural user requests route to the right pre-implementation handoffs"

prompts:
  - id: implementing-linear-issue
    label: implementing-linear-issue
    raw: file://../../prompts/skill-implementing-linear-issue.txt

providers:
  - id: file://../../scripts/opencode-cli-provider.js
    config:
      provider_id: opencode
      model: qwen3.6-plus
      working_dir: ../..
      max_turns: 20
      tools:
        read: true
        grep: true
        glob: true
        list: true
        bash: true

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-linear-skill-contract.js

tests:
  - description: "implement-issue — creates branch/worktree first, commits during implementation, runs local gates, no PR/push"
    vars:
      eval_type: user-behavior
      failure_modes: "acts-before-reading-local-context,creates-pr-too-early,premature-success-claim"
      scenario: |-
        - The user says: "implement ENG-1023. The approach in the issue is approved; start the first coding slice."
        - Simulated Linear metadata: team `Internal-IT`, project `Engineering Skills`, current status `Ready for Development`.
        - Codebase review confirms the work is localized to one module and the issue's implementation approach is clear.
        - The issue has User Flow label `UF-Checkout-Receipts`, and `docs/functional/UF-Checkout-Receipts/README.md` exists.
        - The implementation plan at `docs/plan/ENG-1023-checkout-receipts.md` was already created by `superpowers:writing-plans` and approved in Linear.
        - No pre-implementation brainstorming, functional spec, design spec, or new writing-plans handoff is needed.
        - No branch or worktree exists yet.
        - Branch and worktree setup succeeds.
      expect_searches_codebase_before_asking_user: "true"
      expect_creates_implementation_plan: "false"
      expect_hands_off_to_brainstorming: "false"
      expect_hands_off_to_authoring_functional_spec: "false"
      expect_hands_off_to_authoring_design_spec: "false"
      expect_uses_writing_plans_before_implementation: "true"
      expect_uses_test_driven_development_for_implementation: "true"
      expect_reads_functional_spec_from_userflow_tag: "true"
      expect_stops_if_userflow_label_missing: "false"
      expect_stops_if_functional_spec_missing: "false"
      expect_uses_code_simplifier_for_simplification_gate: "true"
      expect_asks_question_immediately: "false"
      expect_creates_branch_and_worktree_first: "true"
      expect_stops_on_branch_or_worktree_failure: "true"
      expect_requires_clean_worktree_for_handoff: "true"
      expect_creates_checkpoint_commits: "true"
      expect_creates_final_commit: "true"
      expect_runs_required_validation: "true"
      expect_runs_skill_evals: "true"
      expect_uses_independent_review_agents: "true"
      expect_runs_code_review: "true"
      expect_runs_simplification_review: "true"
      expect_runs_test_coverage_review: "true"
      expect_runs_acceptance_criteria_review: "true"
      expect_updates_linear_with_ac_status: "true"
      expect_posts_linear_note_with_tests_and_next_steps: "true"
      expect_creates_pr: "false"
      forbidden_terms: "pushes_git\":true,implements_before_plan_approval\":true"

  - description: "natural request — user asks to think through approach before implementing"
    vars:
      eval_type: user-behavior
      failure_modes: "implements-before-brainstorming,acts-before-reading-local-context"
      scenario: |-
        - The user says: "implement ENG-1041, but think through the approach with me before you start coding."
        - Simulated Linear metadata: team `Internal-IT`, project `Engineering Skills`, current status `Ready for Development`.
        - The Linear issue exists and describes a normal backend behavior change.
        - The issue has User Flow label `UF-Notification-Rules`, and `docs/functional/UF-Notification-Rules/README.md` exists.
        - Codebase review can identify the likely files and no design doc gap is evident.
        - The issue touches one module.
        - No implementation edits have started.
      expect_searches_codebase_before_asking_user: "true"
      expect_creates_implementation_plan: "false"
      expect_hands_off_to_brainstorming: "true"
      expect_hands_off_to_authoring_functional_spec: "false"
      expect_hands_off_to_authoring_design_spec: "false"
      expect_uses_writing_plans_before_implementation: "true"
      expect_reads_functional_spec_from_userflow_tag: "true"
      expect_asks_question_immediately: "false"
      expect_creates_branch_and_worktree_first: "true"
      expect_creates_pr: "false"
      forbidden_terms: "implements_before_plan_approval\":true,pushes_git\":true"

  - description: "natural request — multi-module implementation needs writing-plans first"
    vars:
      eval_type: user-behavior
      failure_modes: "misses-required-handoff,acts-before-reading-local-context"
      scenario: |-
        - The user says: "implement ENG-1042. It touches the API route, background worker, and dashboard state, so make a real plan before coding."
        - Simulated Linear metadata: team `Internal-IT`, project `Engineering Skills`, current status `Ready for Development`.
        - The Linear issue exists and the acceptance criteria are clear.
        - The issue has User Flow label `UF-Dashboard-Sync`, and `docs/functional/UF-Dashboard-Sync/README.md` exists.
        - Codebase review confirms the work spans `src/server/routes`, `src/workers`, and `src/app/dashboard`.
        - Existing functional and design docs cover the behavior; no new design decision is needed.
        - No implementation edits have started.
      expect_searches_codebase_before_asking_user: "true"
      expect_creates_implementation_plan: "true"
      expect_hands_off_to_brainstorming: "false"
      expect_hands_off_to_authoring_functional_spec: "false"
      expect_hands_off_to_authoring_design_spec: "false"
      expect_uses_writing_plans_before_implementation: "true"
      expect_reads_functional_spec_from_userflow_tag: "true"
      expect_asks_question_immediately: "false"
      expect_creates_branch_and_worktree_first: "true"
      expect_creates_pr: "false"
      required_terms: "writing-plans"
      forbidden_terms: "pushes_git\":true"

  - description: "natural request — complex architecture needs design doc handoff"
    vars:
      eval_type: user-behavior
      failure_modes: "misses-required-handoff,acts-before-reading-local-context"
      scenario: |-
        - The user says: "implement ENG-1043. This changes how tenant permissions are modeled across the API, jobs, and audit logs, so don't just patch it."
        - Simulated Linear metadata: team `Internal-IT`, project `Engineering Skills`, current status `Ready for Development`.
        - The Linear issue exists but has no linked design doc.
        - The issue has User Flow label `UF-Tenant-Permissions`, and `docs/functional/UF-Tenant-Permissions/README.md` exists.
        - Codebase review finds durable authorization and audit-log architecture decisions are missing.
        - No implementation edits have started.
      expect_searches_codebase_before_asking_user: "true"
      expect_creates_implementation_plan: "false"
      expect_hands_off_to_brainstorming: "false"
      expect_hands_off_to_authoring_functional_spec: "false"
      expect_hands_off_to_authoring_design_spec: "true"
      expect_uses_writing_plans_before_implementation: "true"
      expect_uses_test_driven_development_for_implementation: "false"
      expect_reads_functional_spec_from_userflow_tag: "true"
      expect_asks_question_immediately: "false"
      expect_creates_branch_and_worktree_first: "true"
      expect_creates_pr: "false"
      required_terms: "authoring-design-spec"
      forbidden_terms: "implements_before_plan_approval\":true,pushes_git\":true"

  - description: "natural request — stale product behavior needs functional spec handoff"
    vars:
      eval_type: user-behavior
      failure_modes: "skips-functional-spec,misses-required-handoff"
      scenario: |-
        - The user says: "implement ENG-1052 for saved exports, but the issue and the user flow doc disagree about what happens after the export expires."
        - Simulated Linear metadata: team `Internal-IT`, project `Engineering Skills`, current status `Ready for Development`.
        - The Linear issue exists and has User Flow label `UF-Saved-Exports`.
        - `docs/functional/UF-Saved-Exports/README.md` exists, but it conflicts with the issue acceptance criteria.
        - Codebase review finds likely export-history files, but product behavior is stale or disputed.
        - No implementation edits have started.
      expect_searches_codebase_before_asking_user: "true"
      expect_creates_implementation_plan: "false"
      expect_hands_off_to_brainstorming: "false"
      expect_hands_off_to_authoring_functional_spec: "true"
      expect_hands_off_to_authoring_design_spec: "false"
      expect_uses_writing_plans_before_implementation: "true"
      expect_uses_test_driven_development_for_implementation: "false"
      expect_reads_functional_spec_from_userflow_tag: "true"
      expect_asks_question_immediately: "false"
      expect_creates_branch_and_worktree_first: "true"
      expect_creates_pr: "false"
      required_terms: "authoring-functional-spec"
      forbidden_terms: "implements_before_plan_approval\":true,pushes_git\":true"

  - description: "natural request — implementation with failures routes to debugging and review handoffs"
    vars:
      eval_type: user-behavior
      failure_modes: "misses-required-handoff,premature-success-claim"
      scenario: |-
        - The user says: "implement ENG-1044 and make sure the flaky export test is really fixed."
        - Simulated Linear metadata: team `Internal-IT`, project `Engineering Skills`, current status `Ready for Development`.
        - The Linear issue exists and the intended behavior is clear.
        - The issue has User Flow label `UF-Exports`, and `docs/functional/UF-Exports/README.md` exists.
        - The implementation plan at `docs/plan/ENG-1044-export-flake.md` already exists from `superpowers:writing-plans`.
        - Codebase review finds the changed behavior is localized to the export service and its tests.
        - During verification, one export test fails intermittently with no obvious cause.
        - The implementation is not ready for handoff yet.
      expect_searches_codebase_before_asking_user: "true"
      expect_creates_implementation_plan: "false"
      expect_hands_off_to_brainstorming: "false"
      expect_hands_off_to_authoring_functional_spec: "false"
      expect_hands_off_to_authoring_design_spec: "false"
      expect_uses_writing_plans_before_implementation: "true"
      expect_uses_test_driven_development_for_implementation: "true"
      expect_uses_writing_tests_when_test_design_needed: "false"
      expect_uses_systematic_debugging_for_failures: "true"
      expect_reads_functional_spec_from_userflow_tag: "true"
      expect_uses_requesting_code_review_for_quality_gate: "false"
      expect_creates_branch_and_worktree_first: "true"
      expect_creates_pr: "false"
      required_terms: "systematic-debugging"
      forbidden_terms: "pushes_git\":true"

  - description: "natural request — quality gate feedback uses receiving-code-review before fixes"
    vars:
      eval_type: user-behavior
      failure_modes: "misses-required-handoff,premature-success-claim"
      scenario: |-
        - The user says: "implement ENG-1051. If the reviews find anything, handle it carefully before handoff."
        - Simulated Linear metadata: team `Internal-IT`, project `Engineering Skills`, current status `Ready for Development`.
        - The Linear issue exists and the intended behavior is clear.
        - The issue has User Flow label `UF-Reports`, and `docs/functional/UF-Reports/README.md` exists.
        - The implementation plan at `docs/plan/ENG-1051-reports.md` already exists from `superpowers:writing-plans`.
        - Implementation and local validation have completed.
        - The independent code-review quality gate returns feedback about an edge case in the report filter logic.
        - The implementation is not ready for final handoff until that feedback is evaluated and resolved.
      expect_searches_codebase_before_asking_user: "true"
      expect_creates_implementation_plan: "false"
      expect_hands_off_to_brainstorming: "false"
      expect_hands_off_to_authoring_functional_spec: "false"
      expect_hands_off_to_authoring_design_spec: "false"
      expect_uses_writing_plans_before_implementation: "true"
      expect_uses_test_driven_development_for_implementation: "true"
      expect_uses_requesting_code_review_for_quality_gate: "true"
      expect_uses_receiving_code_review_for_review_feedback: "true"
      expect_uses_code_simplifier_for_simplification_gate: "true"
      expect_reads_functional_spec_from_userflow_tag: "true"
      expect_creates_branch_and_worktree_first: "true"
      expect_creates_pr: "false"
      required_terms: "receiving-code-review"
      forbidden_terms: "pushes_git\":true"

  - description: "natural request — major refactor needs a written plan before behavior-preserving changes"
    vars:
      eval_type: user-behavior
      failure_modes: "misses-required-handoff,acts-before-reading-local-context"
      scenario: |-
        - The user says: "implement ENG-1045. The old importer is tangled; refactor it without changing behavior and break it into safe steps."
        - Simulated Linear metadata: team `Internal-IT`, project `Engineering Skills`, current status `Ready for Development`.
        - The Linear issue exists and describes a behavior-preserving cleanup.
        - The issue has User Flow label `UF-Importer`, and `docs/functional/UF-Importer/README.md` exists.
        - Codebase review finds the refactor crosses parser, validation, and import job modules.
        - Existing architecture is still valid; no new design decision is needed.
        - No implementation edits have started.
      expect_searches_codebase_before_asking_user: "true"
      expect_hands_off_to_brainstorming: "false"
      expect_hands_off_to_authoring_design_spec: "false"
      expect_uses_writing_plans_before_implementation: "true"
      expect_creates_implementation_plan: "true"
      expect_reads_functional_spec_from_userflow_tag: "true"
      expect_creates_branch_and_worktree_first: "true"
      expect_creates_pr: "false"
      required_terms: "writing-plans"
      forbidden_terms: "pushes_git\":true"

  - description: "natural request — UI work with no approved interface needs design spec before coding"
    vars:
      eval_type: user-behavior
      failure_modes: "misses-required-handoff,acts-before-reading-local-context"
      scenario: |-
        - The user says: "implement ENG-1046. Add the new settings panel UI; there isn't a mockup yet, so design the interface before coding."
        - Simulated Linear metadata: team `Internal-IT`, project `Engineering Skills`, current status `Ready for Development`.
        - The Linear issue exists but does not define the settings panel states, interactions, or component contract.
        - The issue has User Flow label `UF-Settings-Panel`, and `docs/functional/UF-Settings-Panel/README.md` exists.
        - Codebase review finds this affects the settings page, shared form components, and persisted preferences.
        - No implementation edits have started.
      expect_searches_codebase_before_asking_user: "true"
      expect_hands_off_to_brainstorming: "false"
      expect_hands_off_to_authoring_design_spec: "true"
      expect_uses_writing_plans_before_implementation: "true"
      expect_uses_test_driven_development_for_implementation: "false"
      expect_reads_functional_spec_from_userflow_tag: "true"
      expect_creates_branch_and_worktree_first: "true"
      expect_creates_pr: "false"
      required_terms: "authoring-design-spec"
      forbidden_terms: "implements_before_plan_approval\":true,pushes_git\":true"

  - description: "natural request — end-user workflow change needs user guide handoff"
    vars:
      eval_type: user-behavior
      failure_modes: "misses-required-handoff,premature-success-claim"
      scenario: |-
        - The user says: "implement ENG-1053. This adds a visible bulk archive action to the Reports page, so make sure the docs get updated too."
        - Simulated Linear metadata: team `Internal-IT`, project `Engineering Skills`, current status `Ready for Development`.
        - The Linear issue exists and has clear acceptance criteria.
        - The issue has User Flow label `UF-Reports-Bulk-Actions`, and `docs/functional/UF-Reports-Bulk-Actions/README.md` exists.
        - Codebase and design-doc search find no unresolved product or design fork.
        - The implementation plan at `docs/plan/ENG-1053-reports-bulk-actions.md` already exists from `superpowers:writing-plans`.
        - The change affects end-user UI labels and workflow documentation.
      expect_searches_codebase_before_asking_user: "true"
      expect_creates_implementation_plan: "false"
      expect_hands_off_to_brainstorming: "false"
      expect_hands_off_to_authoring_functional_spec: "false"
      expect_hands_off_to_authoring_design_spec: "false"
      expect_uses_writing_plans_before_implementation: "true"
      expect_uses_test_driven_development_for_implementation: "true"
      expect_uses_authoring_user_guide_when_user_docs_needed: "true"
      expect_reads_functional_spec_from_userflow_tag: "true"
      expect_creates_branch_and_worktree_first: "true"
      expect_creates_pr: "false"
      required_terms: "authoring-user-guide"
      forbidden_terms: "pushes_git\":true"

  - description: "natural request — bug issue needs systematic debugging before fix"
    vars:
      eval_type: user-behavior
      failure_modes: "misses-required-handoff,premature-success-claim"
      scenario: |-
        - The user says: "fix ENG-1047. Users get a 500 when they export after filtering by owner."
        - Simulated Linear metadata: team `Internal-IT`, project `Engineering Skills`, current status `Ready for Development`.
        - The Linear issue is a bug report with a production symptom but no root cause.
        - The issue has User Flow label `UF-Exports`, and `docs/functional/UF-Exports/README.md` exists.
        - Codebase review finds likely export and filter code paths, but the failing condition has not been reproduced yet.
        - No implementation edits have started.
      expect_searches_codebase_before_asking_user: "true"
      expect_hands_off_to_brainstorming: "false"
      expect_hands_off_to_authoring_design_spec: "false"
      expect_uses_systematic_debugging_for_failures: "true"
      expect_shows_root_cause_and_fix_before_bug_fix: "true"
      expect_proceeds_after_root_cause_fix_confirmation: "true"
      expect_simple_bug_can_skip_writing_plan: "true"
      expect_uses_writing_plans_before_implementation: "false"
      expect_creates_implementation_plan: "false"
      expect_uses_test_driven_development_for_implementation: "false"
      expect_reads_functional_spec_from_userflow_tag: "true"
      expect_creates_branch_and_worktree_first: "true"
      expect_creates_pr: "false"
      required_terms: "systematic-debugging,root cause,fix"
      forbidden_terms: "implements_before_plan_approval\":true,pushes_git\":true"

  - description: "natural request — linked functional spec, design doc, and plan are read and cited in Linear updates"
    vars:
      eval_type: user-behavior
      failure_modes: "acts-before-reading-local-context,misses-required-handoff"
      scenario: |-
        - The user says: "implement ENG-1048 for the export history flow."
        - Simulated Linear metadata: team `Internal-IT`, project `Engineering Skills`, current status `Ready for Development`.
        - The Linear issue has User Flow label `UF-Export-History`.
        - `docs/functional/UF-Export-History/README.md` exists and defines the product behavior.
        - Codebase and doc search find a related design document at `docs/design/export-history/README.md`.
        - Codebase and doc search find an existing implementation plan at `docs/plan/ENG-1048-export-history.md`.
        - The issue's behavior and design are already approved; implementation can proceed after normal plan approval.
      expect_searches_codebase_before_asking_user: "true"
      expect_creates_implementation_plan: "false"
      expect_reads_functional_spec_from_userflow_tag: "true"
      expect_uses_writing_plans_before_implementation: "true"
      expect_searches_related_design_docs: "true"
      expect_tracks_related_implementation_plan: "true"
      expect_linear_update_references_functional_spec: "true"
      expect_linear_update_references_design_doc: "true"
      expect_linear_update_references_implementation_plan: "true"
      expect_hands_off_to_authoring_functional_spec: "false"
      expect_hands_off_to_authoring_design_spec: "false"
      expect_creates_branch_and_worktree_first: "true"
      expect_creates_pr: "false"
      forbidden_terms: "pushes_git\":true"

  - description: "natural request — missing User Flow label stops before planning"
    vars:
      eval_type: user-behavior
      failure_modes: "skips-user-flow,premature-success-claim"
      scenario: |-
        - The user says: "implement ENG-1049 for the billing export flow."
        - Simulated Linear metadata: team `Internal-IT`, project `Engineering Skills`, current status `Ready for Development`.
        - The Linear issue exists, but it has no User Flow label.
        - The issue has acceptance criteria and likely code paths, but no functional-spec folder can be derived from a label.
        - No implementation edits have started.
      expect_searches_codebase_before_asking_user: "false"
      expect_stops_if_userflow_label_missing: "true"
      expect_stops_if_functional_spec_missing: "false"
      expect_reads_functional_spec_from_userflow_tag: "false"
      expect_creates_implementation_plan: "false"
      expect_uses_test_driven_development_for_implementation: "false"
      expect_creates_branch_and_worktree_first: "true"
      expect_creates_pr: "false"
      required_terms: "user flow,label,stop"
      forbidden_terms: "implements_before_plan_approval\":true,pushes_git\":true"

  - description: "natural request — missing functional spec folder stops before planning"
    vars:
      eval_type: user-behavior
      failure_modes: "skips-functional-spec,premature-success-claim"
      scenario: |-
        - The user says: "implement ENG-1050 for saved filters."
        - Simulated Linear metadata: team `Internal-IT`, project `Engineering Skills`, current status `Ready for Development`.
        - The Linear issue has User Flow label `UF-Saved-Filters`.
        - `docs/functional/UF-Saved-Filters/` does not exist.
        - The issue has acceptance criteria and likely code paths, but the required functional spec folder is missing.
        - No implementation edits have started.
      expect_searches_codebase_before_asking_user: "false"
      expect_stops_if_userflow_label_missing: "false"
      expect_stops_if_functional_spec_missing: "true"
      expect_reads_functional_spec_from_userflow_tag: "false"
      expect_creates_implementation_plan: "false"
      expect_uses_test_driven_development_for_implementation: "false"
      expect_creates_branch_and_worktree_first: "true"
      expect_creates_pr: "false"
      required_terms: "docs/functional/UF-Saved-Filters,stop"
      forbidden_terms: "implements_before_plan_approval\":true,pushes_git\":true"
