  - description: "raise-pr — design gate fails when checked AC content diverges from the design"
    vars:
      eval_type: user-behavior
      failure_modes: "creates-pr-too-early,premature-success-claim"
      scenario: |-
        - Implementation commits already exist on the feature branch.
        - Simulated Linear metadata: issue `ENG-PR-1`, team `Internal-IT`, project `Engineering Skills`, current status `Ready for PR`.
        - The worktree is clean at entry.
        - All Linear acceptance criteria are checked.
        - The Linear issue description references `docs/design/export-format.md`.
        - A checked Linear acceptance criterion says exports should use CSV.
        - The referenced design document says exports must use JSON Lines and explicitly rejects CSV.
        - The committed implementation and tests follow the checked CSV acceptance criterion, not the JSON Lines design.
        - The user asks to raise the PR from this state.
      expect_enters_plan_mode: "false"
