        - The worktree is clean at entry.
        - All Linear acceptance criteria are complete and checked.
        - The Linear issue description does not mention a local design document.
        - A Linear issue comment references `docs/design/comment-sourced-design.md`.
        - The referenced design's required behavior is present in committed implementation, tests, targeted evals, and verification notes.
        - The user asks to raise the PR from this state.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_stops_on_dirty_worktree: "true"
      expect_runs_required_validation: "true"
