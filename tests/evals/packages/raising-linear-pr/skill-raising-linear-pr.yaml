# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Raising-linear-pr skill — verification, AC completion check, PR creation, and In Review transition"

prompts:
  - id: raising-linear-pr
    label: raising-linear-pr
    raw: file://../../prompts/skill-raising-linear-pr.txt

providers:
  - id: file://../../scripts/opencode-cli-provider.js
    config:
      provider_id: opencode
      model: qwen3.6-plus
      working_dir: ../..
      max_turns: 20
      tools:
        read: true
        grep: true
        glob: true
        list: true
        bash: true

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-linear-skill-contract.js

tests:
  - description: "raise-pr — reruns PR gates without new local commits and moves issue to In Review"
    vars:
      scenario: |-
        - Implementation is complete.
        - Implementation commits already exist on the feature branch.
        - The worktree must be clean before entering this workflow; do not create a final implementation commit in this phase.
        - Acceptance criteria are already complete and checked before PR creation.
        - Since the acceptance criteria are already checked, this scenario does not require checking off acceptance criteria during the PR phase.
        - This scenario should not stop for incomplete acceptance criteria because none are incomplete, unproven, or blocked.
        - The PR body should link the actual Linear issue IDs rather than using a workspace-specific hardcoded prefix.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_stops_on_dirty_worktree: "true"
      expect_runs_required_validation: "true"
      expect_runs_skill_evals: "true"
      expect_checks_promptfoo_db_for_latest_passing_eval: "true"
      expect_compares_eval_runs_to_content_relevant_changes: "true"
      expect_avoids_full_eval_suite_by_default: "true"
      expect_runs_only_stale_targeted_evals: "true"
      expect_falls_back_to_eval_when_db_evidence_missing: "true"
      expect_pushes_branch: "true"
      expect_creates_pr: "true"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_checks_off_acceptance_criteria: "false"
      expect_checks_off_only_proven_acceptance_criteria: "false"
      expect_hands_back_to_implementation_when_ac_requires_code: "false"
      expect_stops_if_acceptance_criteria_incomplete: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_compares_design_to_implementation_evidence: "false"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "false"
      expected_design_conformance_result: "not_applicable"
      expected_design_paths_empty: "true"
      expect_moves_issue_to_in_review: "true"
      expect_merges_pr: "false"
      expect_uses_generic_issue_linking_language: "true"
      required_terms: "review,dirty,issue,acceptance,stop,promptfoo,db,content,relevant,stale,targeted,design,not_applicable"
      forbidden_terms: "vu-xxx"

  - description: "raise-pr — checks off only proven ACs and hands back if an AC needs implementation"
    vars:
      scenario: |-
        - Implementation commits already exist on the feature branch.
        - The worktree is clean at entry.
        - Linear has three acceptance criteria:
          - AC 1 is already checked.
          - AC 2 is complete in existing committed work but is not checked in Linear.
          - AC 3 is not proven complete and would require code or test changes to satisfy.
        - The workflow must not edit files or create a final implementation commit in this PR phase.
        - The workflow must not create or update a PR while any AC remains unproven.
        - The workflow may update Linear metadata for ACs that are already proven by existing committed work.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_runs_required_validation: "false"
      expect_runs_skill_evals: "false"
      expect_checks_promptfoo_db_for_latest_passing_eval: "false"
      expect_pushes_branch: "false"
      expect_creates_pr: "false"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_hands_back_to_implementation_when_ac_requires_code: "true"
      expect_stops_if_acceptance_criteria_incomplete: "true"
      expect_runs_design_conformance_gate: "false"
      expect_moves_issue_to_in_review: "false"
      expect_merges_pr: "false"
      required_terms: "proven,implementation,stop,commit"

  - description: "raise-pr — checks off proven ACs then runs design gate before PR"
    vars:
      scenario: |-
        - Implementation commits already exist on the feature branch.
        - The worktree is clean at entry.
        - Linear has two acceptance criteria:
          - AC 1 is already checked.
          - AC 2 is complete in existing committed work but is not checked in Linear.
        - No acceptance criteria are incomplete, unproven, blocked, or requiring code/test/docs changes.
        - The Linear issue description references `docs/design/proven-ac-design.md`.
        - The referenced design's required behavior is present in committed implementation, tests, targeted evals, and verification notes.
        - The workflow should check off AC 2 as metadata bookkeeping, then run the design conformance gate before validation, push, or PR creation.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_stops_on_dirty_worktree: "true"
      expect_runs_required_validation: "true"
      expect_runs_skill_evals: "true"
      expect_checks_promptfoo_db_for_latest_passing_eval: "true"
      expect_pushes_branch: "true"
      expect_creates_pr: "true"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_checks_off_acceptance_criteria: "true"
      expect_checks_off_only_proven_acceptance_criteria: "true"
      expect_hands_back_to_implementation_when_ac_requires_code: "false"
      expect_stops_if_acceptance_criteria_incomplete: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_compares_design_to_implementation_evidence: "true"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "false"
      expected_design_conformance_result: "pass"
      expected_design_paths_include: "docs/design/proven-ac-design.md"
      expect_moves_issue_to_in_review: "true"
      expect_merges_pr: "false"
      required_terms: "proven,check,design,pass,validation,push,pr"

  - description: "raise-pr — passes design conformance when referenced local design matches evidence"
    vars:
      scenario: |-
        - Implementation commits already exist on the feature branch.
        - The worktree is clean at entry.
        - All Linear acceptance criteria are complete and checked.
        - The Linear issue description references `docs/superpowers/specs/2026-04-20-search-design.md`.
        - The design document's required behavior is present in the committed implementation.
        - The committed tests, targeted eval results, acceptance-criteria state, and verification notes cover the design-critical behavior.
        - The workflow should record the checked design path and a concise pass result in PR-phase evidence before pushing or creating the PR.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_stops_on_dirty_worktree: "true"
      expect_runs_required_validation: "true"
      expect_runs_skill_evals: "true"
      expect_checks_promptfoo_db_for_latest_passing_eval: "true"
      expect_pushes_branch: "true"
      expect_creates_pr: "true"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_checks_off_acceptance_criteria: "false"
      expect_checks_off_only_proven_acceptance_criteria: "false"
      expect_hands_back_to_implementation_when_ac_requires_code: "false"
      expect_stops_if_acceptance_criteria_incomplete: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_compares_design_to_implementation_evidence: "true"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "false"
      expected_design_conformance_result: "pass"
      expected_design_paths_include: "docs/superpowers/specs/2026-04-20-search-design.md"
      expect_moves_issue_to_in_review: "true"
      expect_merges_pr: "false"
      required_terms: "design,pass,evidence,implementation,evals,acceptance"

  - description: "raise-pr — blocks before push and PR when design conformance fails"
    vars:
      scenario: |-
        - Implementation commits already exist on the feature branch.
        - The worktree is clean at entry.
        - All Linear acceptance criteria are complete and checked.
        - The Linear issue description references `docs/design/billing-retry.md`.
        - The design document requires retry telemetry and an error-state eval.
        - The committed implementation omits retry telemetry and the verification evidence lacks design-critical tests and evals.
        - The workflow must stop before push or PR creation and report concise design mismatch evidence for the implementation phase.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_runs_required_validation: "false"
      expect_runs_skill_evals: "false"
      expect_checks_promptfoo_db_for_latest_passing_eval: "false"
      expect_pushes_branch: "false"
      expect_creates_pr: "false"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_checks_off_acceptance_criteria: "false"
      expect_checks_off_only_proven_acceptance_criteria: "false"
      expect_hands_back_to_implementation_when_ac_requires_code: "false"
      expect_stops_if_acceptance_criteria_incomplete: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_compares_design_to_implementation_evidence: "true"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "true"
      expected_design_conformance_result: "fail"
      expected_design_paths_include: "docs/design/billing-retry.md"
      expect_moves_issue_to_in_review: "false"
      expect_merges_pr: "false"
      required_terms: "design,docs/design,fail,block,stop,pr,implementation,evidence,evals"

  - description: "raise-pr — finds design reference in Linear comment evidence"
    vars:
      scenario: |-
        - Implementation commits already exist on the feature branch.
        - The worktree is clean at entry.
        - All Linear acceptance criteria are complete and checked.
        - The Linear issue description does not mention a local design document.
        - A Linear issue comment references `docs/design/comment-sourced-design.md`.
        - The referenced design's required behavior is present in committed implementation, tests, targeted evals, and verification notes.
        - The workflow should inspect Linear comments, record the checked design path, pass design conformance, and continue to validation, evals, push, PR creation, and In Review transition.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_stops_on_dirty_worktree: "true"
      expect_runs_required_validation: "true"
      expect_runs_skill_evals: "true"
      expect_checks_promptfoo_db_for_latest_passing_eval: "true"
      expect_pushes_branch: "true"
      expect_creates_pr: "true"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_checks_off_acceptance_criteria: "false"
      expect_checks_off_only_proven_acceptance_criteria: "false"
      expect_hands_back_to_implementation_when_ac_requires_code: "false"
      expect_stops_if_acceptance_criteria_incomplete: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_compares_design_to_implementation_evidence: "true"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "false"
      expected_design_conformance_result: "pass"
      expected_design_paths_include: "docs/design/comment-sourced-design.md"
      expect_moves_issue_to_in_review: "true"
      expect_merges_pr: "false"
      required_terms: "design,comment,pass,evidence,pr"

  - description: "raise-pr — records all referenced design document paths"
    vars:
      scenario: |-
        - Implementation commits already exist on the feature branch.
        - The worktree is clean at entry.
        - All Linear acceptance criteria are complete and checked.
        - The Linear issue references both `docs/design/api-contract.md` and `docs/superpowers/specs/2026-04-20-ui-flow-design.md`.
        - Both referenced designs match the committed implementation, tests, targeted evals, and verification notes.
        - The workflow must read both design documents, record both checked paths, pass design conformance, and continue to validation, evals, push, PR creation, and In Review transition.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_stops_on_dirty_worktree: "true"
      expect_runs_required_validation: "true"
      expect_runs_skill_evals: "true"
      expect_checks_promptfoo_db_for_latest_passing_eval: "true"
      expect_pushes_branch: "true"
      expect_creates_pr: "true"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_checks_off_acceptance_criteria: "false"
      expect_checks_off_only_proven_acceptance_criteria: "false"
      expect_hands_back_to_implementation_when_ac_requires_code: "false"
      expect_stops_if_acceptance_criteria_incomplete: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_compares_design_to_implementation_evidence: "true"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "false"
      expected_design_conformance_result: "pass"
      expected_design_paths_include: "docs/design/api-contract.md,docs/superpowers/specs/2026-04-20-ui-flow-design.md"
      expect_moves_issue_to_in_review: "true"
      expect_merges_pr: "false"
      required_terms: "design,docs/design,docs/superpowers/specs,both,pass"

  - description: "raise-pr — design gate fails when checked AC content diverges from the design"
    vars:
      scenario: |-
        - Implementation commits already exist on the feature branch.
        - The worktree is clean at entry.
        - All Linear acceptance criteria are checked.
        - The Linear issue description references `docs/design/export-format.md`.
        - The workflow still has the required dirty-worktree entry guard, even though this scenario's current worktree is clean.
        - A checked Linear acceptance criterion says exports should use CSV.
        - The referenced design document says exports must use JSON Lines and explicitly rejects CSV.
        - The committed implementation and tests follow the checked CSV acceptance criterion, not the JSON Lines design.
        - The design conformance gate must treat the design document as the source of truth. It may use AC checkbox status only to know that the AC gate passed, not to judge whether CSV is acceptable.
        - The workflow must fail design conformance and stop before validation, evals, push, or PR creation.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_stops_on_dirty_worktree: "true"
      expect_runs_required_validation: "false"
      expect_runs_skill_evals: "false"
      expect_checks_promptfoo_db_for_latest_passing_eval: "false"
      expect_pushes_branch: "false"
      expect_creates_pr: "false"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_checks_off_acceptance_criteria: "false"
      expect_checks_off_only_proven_acceptance_criteria: "false"
      expect_hands_back_to_implementation_when_ac_requires_code: "false"
      expect_stops_if_acceptance_criteria_incomplete: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_compares_design_to_implementation_evidence: "true"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "true"
      expected_design_conformance_result: "fail"
      expected_design_paths_include: "docs/design/export-format.md"
      expect_moves_issue_to_in_review: "false"
      expect_merges_pr: "false"
      required_terms: "design,acceptance,checked,fail,csv,json,stop"

  - description: "raise-pr — records not_applicable when no design document is referenced"
    vars:
      scenario: |-
        - Implementation commits already exist on the feature branch.
        - The worktree is clean at entry.
        - All Linear acceptance criteria are complete and checked.
        - The Linear issue, comments, attachments, and linked documents do not reference a local design document path.
        - The workflow should record design conformance as not_applicable and continue through validation, stale targeted eval decisions, push, PR creation, and In Review transition.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_stops_on_dirty_worktree: "true"
      expect_runs_required_validation: "true"
      expect_runs_skill_evals: "true"
      expect_checks_promptfoo_db_for_latest_passing_eval: "true"
      expect_pushes_branch: "true"
      expect_creates_pr: "true"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_checks_off_acceptance_criteria: "false"
      expect_checks_off_only_proven_acceptance_criteria: "false"
      expect_hands_back_to_implementation_when_ac_requires_code: "false"
      expect_stops_if_acceptance_criteria_incomplete: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_compares_design_to_implementation_evidence: "false"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "false"
      expected_design_conformance_result: "not_applicable"
      expected_design_paths_empty: "true"
      expect_moves_issue_to_in_review: "true"
      expect_merges_pr: "false"
      required_terms: "design,not_applicable,evidence,promptfoo,targeted,pr"
