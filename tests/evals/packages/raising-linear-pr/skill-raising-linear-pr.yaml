  - description: "raise-pr — finds design reference in Linear comment evidence"
    vars:
      eval_type: user-behavior
      failure_modes: "acts-before-reading-local-context,creates-pr-too-early"
      scenario: |-
        - Implementation commits already exist on the feature branch.
