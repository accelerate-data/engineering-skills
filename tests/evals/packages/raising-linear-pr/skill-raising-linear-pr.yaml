        - All Linear acceptance criteria are complete and checked.
        - The Linear issue description references `docs/design/billing-retry.md`.
        - The design document requires retry telemetry and an error-state eval.
        - The committed implementation omits retry telemetry and the verification evidence lacks design-critical tests and evals.
        - The user asks to raise the PR from this state.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
