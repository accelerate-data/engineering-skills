# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Raising-linear-pr skill — verification, AC completion check, PR creation, and In Review transition"

prompts:
  - id: raising-linear-pr
    label: raising-linear-pr
    raw: file://../../prompts/skill-raising-linear-pr.txt

providers:
  - id: file://../../scripts/opencode-cli-provider.js
    config:
      provider_id: opencode
      model: qwen3.6-plus
      working_dir: ../..
      max_turns: 20
      tools:
        read: true
        grep: true
        glob: true
        list: true
        bash: true

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-linear-skill-contract.js

tests:
  - description: "raise-pr — uses fresh eval evidence without new local commits and moves issue to In Review"
    vars:
      eval_type: user-behavior
      failure_modes: "creates-pr-too-early,acts-before-reading-local-context,premature-success-claim"
      user_prompt: "Raise the PR for ENG-PR-1. The implementation is finished and I want it moved into review."
      simulated_context: |-
        Linear issue ENG-PR-1 exists.
        Team: Internal-IT.
        Project: Engineering Skills.
        Current Linear status: Ready for PR.
        Branch state: implementation commits already exist on the feature branch.
        Entry worktree state: clean.
        Acceptance criteria state: all criteria are complete and already checked in Linear.
        Missing or blocked acceptance criteria: none.
        Linked design docs: none in the issue description, comments, attachments, or linked documents.
        Latest eval evidence: the promptfoo DB has a latest fully passing targeted run that is newer than content-relevant changes; targeted eval reruns are only needed if that evidence is stale or absent.
        PR requirement: the PR body should link actual Linear issue IDs rather than using a workspace-specific hardcoded prefix.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_runs_required_validation: "true"
      expect_checks_promptfoo_db_for_latest_passing_eval: "true"
      expect_compares_eval_runs_to_content_relevant_changes: "true"
      expect_avoids_full_eval_suite_by_default: "true"
      expect_falls_back_to_eval_when_db_evidence_missing: "false"
      expect_pushes_branch: "true"
      expect_creates_pr: "true"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "false"
      expected_design_conformance_result: "not_applicable"
      expected_design_paths_empty: "true"
      expect_moves_issue_to_in_review: "true"
      expect_merges_pr: "false"
      required_terms: "review,dirty,issue,acceptance,stop,promptfoo,db,content,relevant,stale,targeted,design,not_applicable"
      forbidden_terms: "vu-xxx"

  - description: "raise-pr — checks off only proven ACs and hands back if an AC needs implementation"
    vars:
      eval_type: user-behavior
      failure_modes: "creates-pr-too-early,premature-success-claim"
      user_prompt: "Can you raise the PR for ENG-PR-1?"
      simulated_context: |-
        Linear issue ENG-PR-1 exists.
        Team: Internal-IT.
        Project: Engineering Skills.
        Current Linear status: Ready for PR.
        Branch state: implementation commits already exist on the feature branch.
        Entry worktree state: clean.
        Linear acceptance criteria:
        - AC 1 is already checked.
        - AC 2 is complete in existing committed work but is not checked in Linear.
        - AC 3 is not proven complete and would require code or test changes to satisfy.
        Linked design docs: none.
        Latest eval evidence: not yet relevant because the AC gate has not passed.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_runs_required_validation: "false"
      expect_runs_skill_evals: "false"
      expect_checks_promptfoo_db_for_latest_passing_eval: "false"
      expect_pushes_branch: "false"
      expect_creates_pr: "false"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_hands_back_to_implementation_when_ac_requires_code: "true"
      expect_stops_if_acceptance_criteria_incomplete: "true"
      expect_runs_design_conformance_gate: "false"
      expect_moves_issue_to_in_review: "false"
      expect_merges_pr: "false"
      required_terms: "proven,implementation,stop,commit"

  - description: "raise-pr — checks off proven ACs then runs design gate before PR"
    vars:
      eval_type: user-behavior
      failure_modes: "creates-pr-too-early,acts-before-reading-local-context"
      user_prompt: "Raise ENG-PR-1 now that the committed work covers the remaining AC."
      simulated_context: |-
        Linear issue ENG-PR-1 exists.
        Team: Internal-IT.
        Project: Engineering Skills.
        Current Linear status: Ready for PR.
        Branch state: implementation commits already exist on the feature branch.
        Entry worktree state: clean.
        Linear acceptance criteria:
        - AC 1 is already checked.
        - AC 2 is complete in existing committed work but is not checked in Linear.
        Incomplete, unproven, blocked, or code-required criteria: none.
        Linked design docs from the issue description: docs/design/proven-ac-design.md.
        Design evidence: docs/design/proven-ac-design.md matches the committed implementation, tests, targeted evals, and verification notes.
        Latest eval evidence: targeted skill eval evidence is present and should be checked for freshness against content-relevant changes.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_runs_required_validation: "true"
      expect_checks_promptfoo_db_for_latest_passing_eval: "true"
      expect_pushes_branch: "true"
      expect_creates_pr: "true"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_checks_off_acceptance_criteria: "true"
      expect_checks_off_only_proven_acceptance_criteria: "true"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_compares_design_to_implementation_evidence: "true"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "false"
      expected_design_conformance_result: "pass"
      expected_design_paths_include: "docs/design/proven-ac-design.md"
      expect_moves_issue_to_in_review: "true"
      expect_merges_pr: "false"
      required_terms: "proven,check,design,pass,validation,push,pr"

  - description: "raise-pr — passes design conformance when referenced local design matches evidence"
    vars:
      eval_type: user-behavior
      failure_modes: "creates-pr-too-early,acts-before-reading-local-context"
      user_prompt: "Open the PR for ENG-PR-1; everything is checked off."
      simulated_context: |-
        Linear issue ENG-PR-1 exists.
        Team: Internal-IT.
        Project: Engineering Skills.
        Current Linear status: Ready for PR.
        Branch state: implementation commits already exist on the feature branch.
        Entry worktree state: clean.
        Acceptance criteria state: all Linear acceptance criteria are complete and checked.
        Linked design docs from the issue description: docs/superpowers/specs/2026-04-20-search-design.md.
        Design evidence: the design document's required behavior is present in the committed implementation.
        Verification evidence: committed tests, targeted eval results, acceptance-criteria state, and verification notes cover the design-critical behavior.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_runs_required_validation: "true"
      expect_checks_promptfoo_db_for_latest_passing_eval: "true"
      expect_pushes_branch: "true"
      expect_creates_pr: "true"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_compares_design_to_implementation_evidence: "true"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "false"
      expected_design_conformance_result: "pass"
      expected_design_paths_include: "docs/superpowers/specs/2026-04-20-search-design.md"
      expect_moves_issue_to_in_review: "true"
      expect_merges_pr: "false"
      required_terms: "design,pass,evidence,implementation,evals,acceptance"

  - description: "raise-pr — blocks before push and PR when design conformance fails"
    vars:
      eval_type: user-behavior
      failure_modes: "creates-pr-too-early,premature-success-claim"
      user_prompt: "Raise the PR for ENG-PR-1. The ACs are checked, so this should be ready."
      simulated_context: |-
        Linear issue ENG-PR-1 exists.
        Team: Internal-IT.
        Project: Engineering Skills.
        Current Linear status: Ready for PR.
        Branch state: implementation commits already exist on the feature branch.
        Entry worktree state: clean.
        Acceptance criteria state: all Linear acceptance criteria are complete and checked.
        Linked design docs from the issue description: docs/design/billing-retry.md.
        Design requirement: docs/design/billing-retry.md requires retry telemetry and an error-state eval.
        Implementation evidence: the committed implementation omits retry telemetry.
        Verification evidence: tests and eval results do not cover the design-critical retry telemetry or error-state behavior.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_pushes_branch: "false"
      expect_creates_pr: "false"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_compares_design_to_implementation_evidence: "true"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "true"
      expected_design_conformance_result: "fail"
      expected_design_paths_include: "docs/design/billing-retry.md"
      expect_moves_issue_to_in_review: "false"
      expect_merges_pr: "false"
      required_terms: "design,docs/design,fail,block,stop,pr,implementation,evidence,evals"

  - description: "raise-pr — finds design reference in Linear comment evidence"
    vars:
      eval_type: user-behavior
      failure_modes: "acts-before-reading-local-context,creates-pr-too-early"
      user_prompt: "Please raise ENG-PR-1. The design link was in a comment, not the issue body."
      simulated_context: |-
        Linear issue ENG-PR-1 exists.
        Team: Internal-IT.
        Project: Engineering Skills.
        Current Linear status: Ready for PR.
        Branch state: implementation commits already exist on the feature branch.
        Entry worktree state: clean.
        Acceptance criteria state: all Linear acceptance criteria are complete and checked.
        Issue description design references: none.
        Linear comment evidence: a comment references docs/design/comment-sourced-design.md.
        Design evidence: docs/design/comment-sourced-design.md matches the committed implementation, tests, targeted evals, and verification notes.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_runs_required_validation: "true"
      expect_checks_promptfoo_db_for_latest_passing_eval: "true"
      expect_pushes_branch: "true"
      expect_creates_pr: "true"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_compares_design_to_implementation_evidence: "true"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "false"
      expected_design_conformance_result: "pass"
      expected_design_paths_include: "docs/design/comment-sourced-design.md"
      expect_moves_issue_to_in_review: "true"
      expect_merges_pr: "false"
      required_terms: "design,comment,pass,evidence,pr"

  - description: "raise-pr — records all referenced design document paths"
    vars:
      eval_type: user-behavior
      failure_modes: "acts-before-reading-local-context,creates-pr-too-early"
      user_prompt: "Raise the PR for ENG-PR-1. There are two design docs tied to this issue."
      simulated_context: |-
        Linear issue ENG-PR-1 exists.
        Team: Internal-IT.
        Project: Engineering Skills.
        Current Linear status: Ready for PR.
        Branch state: implementation commits already exist on the feature branch.
        Entry worktree state: clean.
        Acceptance criteria state: all Linear acceptance criteria are complete and checked.
        Referenced design docs: docs/design/api-contract.md and docs/superpowers/specs/2026-04-20-ui-flow-design.md.
        Design evidence: both referenced designs match the committed implementation, tests, targeted evals, and verification notes.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_runs_required_validation: "true"
      expect_checks_promptfoo_db_for_latest_passing_eval: "true"
      expect_pushes_branch: "true"
      expect_creates_pr: "true"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_compares_design_to_implementation_evidence: "true"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "false"
      expected_design_conformance_result: "pass"
      expected_design_paths_include: "docs/design/api-contract.md,docs/superpowers/specs/2026-04-20-ui-flow-design.md"
      expect_moves_issue_to_in_review: "true"
      expect_merges_pr: "false"
      required_terms: "design,docs/design,docs/superpowers/specs,pass"

  - description: "raise-pr — design gate fails when checked AC content diverges from the design"
    vars:
      eval_type: user-behavior
      failure_modes: "creates-pr-too-early,premature-success-claim"
      user_prompt: "Raise the PR for ENG-PR-1; the ACs are all checked."
      simulated_context: |-
        Linear issue ENG-PR-1 exists.
        Team: Internal-IT.
        Project: Engineering Skills.
        Current Linear status: Ready for PR.
        Branch state: implementation commits already exist on the feature branch.
        Entry worktree state: clean.
        Acceptance criteria state: all Linear acceptance criteria are checked.
        Checked acceptance criterion: exports should use CSV.
        Linked design docs from the issue description: docs/design/export-format.md.
        Design requirement: docs/design/export-format.md says exports must use JSON Lines and explicitly rejects CSV.
        Implementation evidence: committed implementation and tests follow the checked CSV acceptance criterion, not the JSON Lines design.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_pushes_branch: "false"
      expect_creates_pr: "false"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_compares_design_to_implementation_evidence: "true"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "true"
      expected_design_conformance_result: "fail"
      expected_design_paths_include: "docs/design/export-format.md"
      expect_moves_issue_to_in_review: "false"
      expect_merges_pr: "false"
      required_terms: "design,acceptance,checked,fail,csv,json,stop"

  - description: "raise-pr — records not_applicable when no design document is referenced"
    vars:
      eval_type: user-behavior
      failure_modes: "acts-before-reading-local-context,creates-pr-too-early"
      user_prompt: "Raise ENG-PR-1. This issue has no referenced design doc."
      simulated_context: |-
        Linear issue ENG-PR-1 exists.
        Team: Internal-IT.
        Project: Engineering Skills.
        Current Linear status: Ready for PR.
        Branch state: implementation commits already exist on the feature branch.
        Entry worktree state: clean.
        Acceptance criteria state: all Linear acceptance criteria are complete and checked.
        Design references: the Linear issue, comments, attachments, and linked documents do not reference a local design document path.
        Latest eval evidence: the promptfoo DB has a latest fully passing targeted run that is newer than content-relevant changes.
      expect_enters_plan_mode: "false"
      expect_creates_checkpoint_commits: "false"
      expect_creates_final_commit: "false"
      expect_edits_code_in_pr_phase: "false"
      expect_runs_required_validation: "true"
      expect_checks_promptfoo_db_for_latest_passing_eval: "true"
      expect_pushes_branch: "true"
      expect_creates_pr: "true"
      expect_creates_pr_with_unproven_acceptance_criteria: "false"
      expect_runs_design_conformance_gate: "true"
      expect_supports_local_design_references: "true"
      expect_records_design_conformance_evidence: "true"
      expect_blocks_pr_for_design_mismatch_in_this_scenario: "false"
      expected_design_conformance_result: "not_applicable"
      expected_design_paths_empty: "true"
      expect_moves_issue_to_in_review: "true"
      expect_merges_pr: "false"
      required_terms: "design,not_applicable,evidence,promptfoo,targeted,pr"
